<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Calls - GPU Trace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tree-node { cursor: pointer; }
        .tree-children { margin-left: 20px; border-left: 1px solid #e5e7eb; }
        .hidden { display: none; }
        .icon-expanded::before { content: "▼"; display: inline-block; width: 1.2em; font-size: 0.8em; }
        .icon-collapsed::before { content: "▶"; display: inline-block; width: 1.2em; font-size: 0.8em; }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/api-calls');
                const data = await response.json();
                renderTree(data, document.getElementById('tree-root'));
            } catch (error) {
                console.error('Error fetching API calls:', error);
                document.getElementById('tree-root').innerHTML = `<p class="text-red-500">Error loading API calls</p>`;
            }
        });

        function renderTree(nodes, container) {
            if (!nodes) return;

            nodes.forEach(node => {
                const nodeDiv = document.createElement('div');
                nodeDiv.className = 'mb-1';

                const hasChildren = node.children && node.children.length > 0;

                // Header
                const header = document.createElement('div');
                header.className = 'flex items-center py-1 hover:bg-gray-100 rounded px-2 select-none tree-node';

                let iconClass = '';
                if (hasChildren) {
                    iconClass = 'icon-expanded'; // Expanded by default
                } else {
                    iconClass = 'pl-5'; // Padding for leaf nodes
                }

                let typeColor = 'text-gray-600';
                if (node.type === 'CommandBuffer') typeColor = 'text-purple-600 font-bold';
                else if (node.type === 'DebugGroup') typeColor = 'text-blue-600 font-semibold';
                else if (node.type === 'Encoder') typeColor = 'text-green-600 font-mono text-sm';

                header.innerHTML = `
                    <span class="${iconClass} text-gray-400 mr-1"></span>
                    <span class="${typeColor}">${node.label}</span>
                    ${node.type === 'Encoder' ? '<span class="ml-2 text-xs text-gray-400">[Encoder]</span>' : ''}
                `;

                nodeDiv.appendChild(header);

                // Children
                if (hasChildren) {
                    const childrenDiv = document.createElement('div');
                    childrenDiv.className = 'tree-children';
                    renderTree(node.children, childrenDiv);
                    nodeDiv.appendChild(childrenDiv);

                    header.addEventListener('click', () => {
                        const isHidden = childrenDiv.classList.toggle('hidden');
                        const iconSpan = header.querySelector('span:first-child');
                        iconSpan.className = isHidden ? 'icon-collapsed text-gray-400 mr-1' : 'icon-expanded text-gray-400 mr-1';
                    });
                }

                container.appendChild(nodeDiv);
            });
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">API Calls</h1>
                <a href="/" class="text-blue-600 hover:text-blue-800 text-sm">← Back to Dashboard</a>
            </div>

            <div>
                <!-- Search could go here -->
            </div>
        </div>

        <div class="bg-white rounded-lg shadow p-6">
            <div id="tree-root" class="font-sans">
                <!-- Tree will be rendered here -->
                <p class="text-gray-500">Loading hierarchy...</p>
            </div>
        </div>
    </div>
</body>
</html>

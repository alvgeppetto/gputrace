<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernels - GPU Trace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        let allKernels = [];

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/kernels');
                allKernels = await response.json();
                renderKernels(allKernels);

                // Setup search
                document.getElementById('search').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = allKernels.filter(k =>
                        k.name.toLowerCase().includes(term)
                    );
                    renderKernels(filtered);
                });

            } catch (error) {
                console.error('Error fetching kernels:', error);
                document.getElementById('kernel-list').innerHTML = `
                    <tr><td colspan="5" class="px-6 py-4 text-center text-red-500">
                        Error loading kernels. Is the server running?
                    </td></tr>`;
            }
        });

        function renderKernels(kernels) {
            const tbody = document.getElementById('kernel-list');

            if (kernels.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-4 text-center text-gray-500">No kernels found</td></tr>`;
                return;
            }

            tbody.innerHTML = kernels.map((k, i) => `
                <tr class="bg-white border-b hover:bg-gray-50">
                    <td class="px-6 py-4 font-mono text-sm text-gray-900 truncate max-w-md" title="${k.name}">
                        ${k.name}
                    </td>
                    <td class="px-6 py-4 text-right text-sm text-gray-500">
                        ${k.dispatches}
                    </td>
                    <td class="px-6 py-4 text-right text-sm text-gray-500">
                        ${k.total_time_ms ? k.total_time_ms.toFixed(2) + ' ms' : '-'}
                    </td>
                    <td class="px-6 py-4 text-right text-sm text-gray-500">
                        ${k.avg_time_ms ? (k.avg_time_ms * 1000).toFixed(0) + ' µs' : '-'}
                    </td>
                    <td class="px-6 py-4 text-right text-sm text-gray-500">
                        ${k.percentage ? k.percentage.toFixed(1) + '%' : '-'}
                    </td>
                </tr>
            `).join('');
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Kernels</h1>
                <a href="/" class="text-blue-600 hover:text-blue-800 text-sm">← Back to Dashboard</a>
            </div>

            <div class="w-1/3">
                <input type="text" id="search" placeholder="Search kernels..."
                    class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="min-w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="px-6 py-3 text-xs font-medium text-gray-500 uppercase tracking-wider">Kernel Name</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Calls</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Total Time</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Avg Time</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">% GPU</th>
                    </tr>
                </thead>
                <tbody id="kernel-list" class="divide-y divide-gray-200">
                    <tr>
                        <td colspan="5" class="px-6 py-4 text-center text-gray-500">Loading kernels...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
